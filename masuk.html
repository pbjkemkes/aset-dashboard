body{

.login-box{
background:white;

<body>

<div class="login-box" id="loginBox">

<h2>Biro PBJ</h2>
<div class="subtitle">Login dengan akun Google</div>

<div id="g_id_onload"
     data-client_id="25559214665-rh7jcb70kg23clnhmdvdd2r0j2d6k1ba.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"></div>

</div>

<script>

const DASHBOARD_URL = "https://sites.google.com/view/rodabaja";

/* HANDLE LOGIN */
function handleCredentialResponse(response){

const data = parseJwt(response.credential);

let email = data.email;

/* validasi domain */
if(!email.endsWith("@kemkes.go.id")){
alert("Gunakan akun Kemenkes");
return;
}

/* simpan session */
data.loginTime = Date.now();
localStorage.setItem("user", JSON.stringify(data));

/* redirect */
window.location.href = DASHBOARD_URL;

}

/* PARSE JWT */
function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>

<!-- LOGIN -->
<div id="loginBox" class="login-box">

<h2>Biro PBJ</h2>
<p>Login dengan akun Google</p>

<div id="g_id_onload"
     data-client_id="25559214665-rh7jcb70kg23clnhmdvdd2r0j2d6k1ba.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard PBJ</h2>

<p id="userInfo"></p>

<button onclick="logout()">Logout</button>

<hr>

<!-- contoh isi dashboard -->
<p>Isi dashboard kamu di sini...</p>

</div>

<script>

/* HANDLE LOGIN */
function handleCredentialResponse(response){

const data = parseJwt(response.credential);

let email = data.email;
let name = data.name;

/* BATASI AKSES */
if(!email.endsWith("@kemkes.go.id")){
alert("Hanya akun Kemenkes yang boleh akses");
return;
}

/* SIMPAN LOGIN */
localStorage.setItem("user", JSON.stringify(data));

showDashboard(data);

}

/* TAMPILKAN DASHBOARD */
function showDashboard(user){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userInfo").innerHTML =
"Login sebagai: <b>"+user.name+"</b> ("+user.email+")";

}

/* AUTO LOGIN */
window.onload = function(){

let user = localStorage.getItem("user");

if(user){
showDashboard(JSON.parse(user));
}

}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* PARSE JWT */
function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>
