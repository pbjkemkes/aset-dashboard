<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Dashboard PBJ</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* LOGIN BOX */
.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
text-align:center;
}

/* DASHBOARD */
#dashboard{
display:none;
padding:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">

<h2>Biro PBJ</h2>
<p>Login dengan akun Google</p>

<div id="g_id_onload"
     data-client_id="CLIENT_ID_KAMU"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard PBJ</h2>

<p id="userInfo"></p>

<button onclick="logout()">Logout</button>

<hr>

<!-- contoh isi dashboard -->
<p>Isi dashboard kamu di sini...</p>

</div>

<script>

/* HANDLE LOGIN */
function handleCredentialResponse(response){

const data = parseJwt(response.credential);

let email = data.email;
let name = data.name;

/* BATASI AKSES */
if(!email.endsWith("@kemkes.go.id")){
alert("Hanya akun Kemenkes yang boleh akses");
return;
}

/* SIMPAN LOGIN */
localStorage.setItem("user", JSON.stringify(data));

showDashboard(data);

}

/* TAMPILKAN DASHBOARD */
function showDashboard(user){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userInfo").innerHTML =
"Login sebagai: <b>"+user.name+"</b> ("+user.email+")";

}

/* AUTO LOGIN */
window.onload = function(){

let user = localStorage.getItem("user");

if(user){
showDashboard(JSON.parse(user));
}

}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* PARSE JWT */
function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>

</body>
</html>
