<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Dashboard PBJ</title>

<!-- Google Identity -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0b5394,#3f79a8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:320px;
}

h2{
margin-bottom:10px;
}

.subtitle{
margin-bottom:25px;
color:#666;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#999;
}
</style>

</head>

<body>

<div class="login-box" id="loginBox" style="display:none">

<h2>Biro PBJ</h2>
<div class="subtitle">Login dengan akun Google</div>

<!-- WAJIB: hanya satu -->
<div id="g_id_onload"
     data-client_id="25559214665-rh7jcb70kg23clnhmdvdd2r0j2d6k1ba.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin" data-type="standard"></div>

<div class="footer">
Akses hanya untuk akun Kemenkes
</div>

</div>

<script>

const DASHBOARD_URL = "https://sites.google.com/view/rodabaja";

/* 🔍 CEK LOGIN SAAT LOAD */
window.onload = function(){

let user = localStorage.getItem("user");

if(user){
try{
let data = JSON.parse(user);

/* validasi email */
if(data.email && data.email.endsWith("@kemkes.go.id")){
window.location.href = DASHBOARD_URL;
return;
}
}catch(e){
console.log("session rusak");
}
}

/* tampilkan login */
document.getElementById("loginBox").style.display = "block";

};


/* 🔐 HANDLE LOGIN */
function handleCredentialResponse(response){

const data = parseJwt(response.credential);

let email = data.email;

/* validasi domain */
if(!email.endsWith("@kemkes.go.id")){
alert("Gunakan akun Kemenkes");
return;
}

/* simpan session */
data.loginTime = Date.now();
localStorage.setItem("user", JSON.stringify(data));

/* redirect */
window.location.href = DASHBOARD_URL;

}


/* 🔧 PARSE JWT */
function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>

</body>
</html>
